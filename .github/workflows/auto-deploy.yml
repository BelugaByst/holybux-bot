name: Auto Deploy to Keep Render Alive

on:
  schedule:
    - cron: '*/3 * * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update smileys and version
        run: |
          # Массив смайликов для ротации
          SMILEYS=("🔥" "✨" "⚡" "💫" "⭐" "🌟" "💥" "🚀" "🎯" "⚙️" "💎" "🔮" "🎪" "🎨" "🦊")
          RANDOM_SMILEY=${SMILEYS[$RANDOM % ${#SMILEYS[@]}]}
          
          echo "👉 Новый смайлик: ${RANDOM_SMILEY}"
          
          # Меняем смайлик в самопинге
          sed -i "s/[✨🔥⚡💫⭐🌟💥🚀🎯⚙️💎🔮🎪🎨🦊] Самопингер активен 24\/7/${RANDOM_SMILEY} Самопингер активен 24\/7/" bot.py || true
          
          # Меняем смайлик в версии
          sed -i "s/# Версия:.*/# Версия: $(date +%Y%m%d-%H%M%S) ${RANDOM_SMILEY}/" bot.py || true
          
          # Меняем смайлик в автопинге
          sed -i "s/[✨🔥⚡💫⭐🌟💥🚀🎯⚙️💎🔮🎪🎨🦊] Автопинг:/${RANDOM_SMILEY} Автопинг:/" bot.py || true

      - name: Commit and push changes
        run: |
          git config --global user.name "Auto Deploy Bot"
          git config --global user.email "bot@github.com"
          git add bot.py
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Автообновление: $(date) ${RANDOM_SMILEY}"
          git push

      # Принудительный деплой через Render API
      - name: Trigger Render Deploy
        run: |
          curl -X POST "https://api.render.com/deploy/srv-d6gvj895pdvs73d9t80?key=kLoo3CPqftM"
