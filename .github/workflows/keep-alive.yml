name: Keep Render Alive

on:
  schedule:
    - cron: '*/1 * * * *'  # Каждую минуту!
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        run: |
          echo "⏰ Будим бота в $(date)"
          curl -I https://hollybux-bot.onrender.com
          echo "✅ Запрос отправлен!"
