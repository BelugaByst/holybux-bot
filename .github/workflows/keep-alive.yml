name: Keep Render Alive

on:
  schedule:
    - cron: '*/3 * * * *'  # Каждые 3 минуты!
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update smileys and version
        run: |
          # Массив смайликов для ротации
          SMILEYS=("🔥" "✨" "⚡" "💫" "⭐" "🌟" "💥" "🚀" "🎯" "⚙️")
          RANDOM_SMILEY=${SMILEYS[$RANDOM % ${#SMILEYS[@]}]}
          
          # Обновляем версию и смайлик
          echo "LAST_UPDATE=$(date +%s)" > .version
          echo "UPDATED_AT=$(date)" >> .version
          echo "BUILD_NUMBER=${{ github.run_number }}" >> .version
          echo "SMILEY=${RANDOM_SMILEY}" >> .version
          
          # Меняем смайлик в разных местах
          sed -i "s/🔥 Самопингер активен 24\/7/${RANDOM_SMILEY} Самопингер активен 24\/7/" bot.py || true
          sed -i "s/✅ Самопинг:/${RANDOM_SMILEY} Автопинг $(date +%H:%M):/" bot.py || true
          
          # Меняем версию в заголовке
          sed -i "s/# Версия:.*/# Версия: $(date +%Y%m%d-%H%M%S) ${RANDOM_SMILEY}/" bot.py || true

      - name: Commit and push changes
        run: |
          git config --global user.name "Auto Deploy Bot"
          git config --global user.email "bot@github.com"
          git add .version bot.py
          git diff --quiet && git diff --staged --quiet || git commit -m "🔄 Автообновление: $(date) | Смайлик дня"
          git push
