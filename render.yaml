services:
  - type: worker
    name: holybux-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    plan: free
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        value: 8009278482
      - key: CHANNEL_ID
        value: "@HolyBux"
      - key: REVIEW_CHANNEL_ID
        value: "@HolyBuxOtziv"

